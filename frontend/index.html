<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Qalb Taskini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --accent: #10b981;
            /* Emerald green */
            --accent-dim: rgba(16, 185, 129, 0.1);
            --border: #e2e8f0;
        }

        body.dark-theme {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --accent: #34d399;
            --accent-dim: rgba(52, 211, 153, 0.1);
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            overflow: hidden;
            /* Prevent scrolling on body, allow in tabs */
        }
        
        .islamic-bg {
            background-color: var(--bg-color);
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='69.2820323027551' viewBox='0 0 40 69.2820323027551' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2310b981' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M0 34.641l20-11.547 20 11.547v23.094l-20 11.547L0 57.735V34.641zm20-8.083l-13 7.506v15.011l13 7.506 13-7.506V34.064l-13-7.506zm13-26.558l13 7.506v15.011l-13 7.506-13-7.506V7.506l13-7.506zm-40 0l13 7.506v15.011l-13 7.506-13-7.506V7.506l13-7.506z'/%3E%3C/g%3E%3C/svg%3E");
        }

        /* Views */
        .view-container {
            display: none;
            height: 100vh;
            padding-bottom: 110px;
            overflow-y: auto;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .view-container.active {
            display: flex;
            flex-direction: column;
        }
        
        .view-container > * {
            flex-shrink: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Apple Fitness Ring */
        .ring-circle {
            transition: stroke-dashoffset 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Tap Effect */
        .tap-area {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tap-area:active {
            transform: scale(0.94);
        }

        /* Bottom Nav - Floating Pill + Animated Dot */
        .glass-nav-container {
            position: fixed;
            bottom: 24px;
            left: 0;
            width: 100%;
            padding: 0 24px;
            z-index: 50;
            pointer-events: none;
            display: flex;
            justify-content: center;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.15);
            border-radius: 40px;
            height: 72px;
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            pointer-events: auto;
        }

        body.dark-theme .glass-nav {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            color: #64748b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 64px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent);
            transform: translateY(-2px);
        }

        .nav-item.active i {
            font-weight: fill;
            text-shadow: 0 4px 12px var(--accent-dim);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--bg-color) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body class="h-screen w-screen flex flex-col justify-between">

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 relative w-full h-full">

        <!-- =================== TASBEH VIEW =================== -->
        <div id="view-tasbeh" class="view-container active islamic-bg w-full h-full items-center justify-between pt-10">
            <!-- Header -->
            <div class="w-full px-8 flex flex-col items-center">
                <div class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide mb-3"
                    style="background: var(--accent-dim); color: var(--accent);">BUGUNGI MAQSAD</div>
                <h1 id="dhikr-title" class="text-3xl font-bold tracking-tight text-center leading-tight">...</h1>
                <p class="text-sm font-medium opacity-60 mt-2 flex items-center gap-2">
                    <i class="ph ph-target"></i> <span id="target-count">--</span> marta
                </p>
            </div>

            <!-- Fitness Ring -->
            <div class="flex-1 flex flex-col items-center justify-center w-full relative">
                <div id="tap-area" class="w-72 h-72 relative tap-area rounded-full cursor-pointer touch-manipulation">
                    <svg class="w-72 h-72 drop-shadow-lg absolute inset-0" viewBox="0 0 100 100">
                        <!-- Background Ring -->
                        <circle cx="50" cy="50" r="44" fill="none" stroke="var(--border)" stroke-width="6"
                            opacity="0.5" />
                        <!-- Progress Ring -->
                        <circle id="progress-ring" class="ring-circle" cx="50" cy="50" r="44" fill="none"
                            stroke="var(--accent)" stroke-width="8" stroke-linecap="round" stroke-dasharray="276.46"
                            stroke-dashoffset="276.46" />
                    </svg>
                    <!-- Counter -->
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="counter" class="text-7xl font-bold tracking-tighter"
                            style="font-variant-numeric: tabular-nums;">0</span>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="w-full px-10 flex justify-between items-center pb-4">
                <button id="reset-btn"
                    class="w-14 h-14 flex items-center justify-center rounded-2xl glass-card text-red-500 active:scale-95 transition-transform shadow-sm">
                    <i class="ph ph-arrow-counter-clockwise text-2xl"></i>
                </button>
                <button id="save-btn"
                    class="flex-1 ml-4 h-14 rounded-2xl text-white font-bold text-lg active:scale-95 transition-transform shadow-lg flex items-center justify-center gap-2"
                    style="background: var(--accent);">
                    <i class="ph ph-check-circle text-xl"></i> Saqlash
                </button>
            </div>
        </div>


        <!-- =================== ZIKRLAR VIEW =================== -->
        <div id="view-zikrlar" class="view-container w-full h-full px-6 pt-8">
            <h1 class="text-3xl font-bold mb-2">Zikrlar</h1>
            <p class="text-sm opacity-60 mb-6">O'zingiz o'qimoqchi bo'lgan zikrni tanlang</p>

            <div id="dhikr-list" class="flex flex-col gap-4 pb-10">
                <!-- Skeletons will be replaced by JS -->
                <div class="glass-card p-5 h-24 skeleton"></div>
                <div class="glass-card p-5 h-24 skeleton"></div>
            </div>
        </div>


        <!-- =================== STATS VIEW =================== -->
        <!-- =================== STATS VIEW =================== -->
        <div id="view-stats" class="view-container w-full h-full px-6 pt-8 pb-32">
            <h1 class="text-3xl font-bold mb-6">Statistika</h1>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="glass-card p-5 flex flex-col items-center justify-center text-center">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center mb-3"
                        style="background: var(--accent-dim); color: var(--accent);">
                        <i class="ph ph-calendar-check text-xl"></i>
                    </div>
                    <span class="text-sm opacity-60 font-medium">Bugun</span>
                    <span id="stat-daily" class="text-2xl font-bold">0</span>
                </div>
                <div class="glass-card p-5 flex flex-col items-center justify-center text-center">
                    <div
                        class="w-10 h-10 rounded-full flex items-center justify-center mb-3 bg-blue-500/10 text-blue-500">
                        <i class="ph ph-globe text-xl"></i>
                    </div>
                    <span class="text-sm opacity-60 font-medium">Umumiy</span>
                    <span id="stat-global" class="text-2xl font-bold">0</span>
                </div>
            </div>

            <!-- Streak and Top Dhikr -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div
                    class="glass-card p-4 flex flex-col items-center justify-center text-center bg-orange-50 dark:bg-orange-900/10 border-orange-200 dark:border-orange-900/30">
                    <i class="ph ph-fire text-2xl text-orange-500 mb-1"></i>
                    <span class="text-[10px] uppercase font-bold tracking-wider opacity-60">Seriya</span>
                    <span id="stat-streak" class="text-xl font-bold text-orange-600 dark:text-orange-400">0 kun</span>
                </div>
                <div
                    class="glass-card p-4 flex flex-col items-center justify-center text-center bg-purple-50 dark:bg-purple-900/10 border-purple-200 dark:border-purple-900/30">
                    <i class="ph ph-trophy text-2xl text-purple-500 mb-1"></i>
                    <span class="text-[10px] uppercase font-bold tracking-wider opacity-60">Sevimli</span>
                    <span id="stat-top"
                        class="text-sm font-bold text-purple-600 dark:text-purple-400 mt-1 line-clamp-1 w-full truncate">...</span>
                </div>
            </div>

            <h3 class="text-lg font-semibold mb-4">Oxirgi 7 kun</h3>
            <div class="glass-card p-5 mb-10">
                <!-- Bar Chart Container -->
                <div id="chart-container" class="flex items-end justify-between h-32 gap-1.5 mt-2">
                    <!-- Skeletons -->
                    <div class="skeleton h-10 flex-1 rounded-t-md"></div>
                    <div class="skeleton h-16 flex-1 rounded-t-md"></div>
                    <div class="skeleton h-8 flex-1 rounded-t-md"></div>
                    <div class="skeleton h-24 flex-1 rounded-t-md"></div>
                    <div class="skeleton h-12 flex-1 rounded-t-md"></div>
                    <div class="skeleton h-20 flex-1 rounded-t-md"></div>
                    <div class="skeleton h-32 flex-1 rounded-t-md"></div>
                </div>
                <!-- X-Axis Labels -->
                <div id="chart-labels"
                    class="flex justify-between items-center mt-3 text-[10px] font-bold opacity-50 uppercase tracking-wide">
                    <!-- Labels injected by JS -->
                </div>
            </div>
        </div>


        <!-- =================== PROFILE VIEW =================== -->
        <div id="view-profile" class="view-container w-full h-full px-6 pt-8 pb-32">
            <h1 class="text-3xl font-bold mb-8">Sozlamalar</h1>

            <div class="glass-card p-6 flex items-center gap-4 mb-8">
                <div
                    class="w-16 h-16 rounded-full flex items-center justify-center text-3xl bg-gray-100 dark:bg-gray-800 shadow-inner">
                    👤
                </div>
                <div class="flex-1">
                    <h2 id="profile-name" class="text-xl font-bold">...</h2>
                    <p id="profile-habit" class="text-sm opacity-60 mt-1 capitalize">...</p>
                </div>
            </div>

            <h3 class="text-sm font-semibold opacity-50 uppercase tracking-widest mb-3 ml-2">Ilova sozlamalari</h3>
            <div class="glass-card flex flex-col mb-8 overflow-hidden">
                <!-- Theme Toggle -->
                <div class="p-4 flex items-center justify-between border-b border-[var(--border)]">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 rounded-full bg-blue-50 dark:bg-blue-900/20 text-blue-500 flex items-center justify-center">
                            <i class="ph ph-palette text-lg"></i>
                        </div>
                        <span class="font-medium text-sm">Mavzu</span>
                    </div>
                    <div class="flex bg-gray-100 dark:bg-gray-800 rounded-lg p-1">
                        <button id="theme-auto"
                            class="px-3 py-1 rounded-md text-[10px] font-bold active-theme shadow-sm bg-white dark:bg-gray-600 text-[var(--accent)] transition-all">Avto</button>
                        <button id="theme-light"
                            class="px-3 py-1 rounded-md text-[10px] font-bold opacity-60 transition-all">Kunduzgi</button>
                        <button id="theme-dark"
                            class="px-3 py-1 rounded-md text-[10px] font-bold opacity-60 transition-all">Tungi</button>
                    </div>
                </div>

                <!-- Haptics Toggle -->
                <div class="p-4 flex items-center justify-between border-b border-[var(--border)]">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 rounded-full bg-orange-50 dark:bg-orange-900/20 text-orange-500 flex items-center justify-center">
                            <i class="ph ph-vibrate text-lg"></i>
                        </div>
                        <div>
                            <span class="font-medium text-sm block">Vibratsiya</span>
                            <span class="text-[10px] opacity-60">Tasbeh bosilganda tebranish</span>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="haptic-toggle" class="sr-only peer" checked>
                        <div
                            class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500">
                        </div>
                    </label>
                </div>

                <!-- Bot Link -->
                <button onclick="tg.openTelegramLink('https://t.me/MyDailyDhikrBot')"
                    class="p-4 flex items-center justify-between active:bg-gray-50 dark:active:bg-gray-800 transition-colors w-full text-left">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 rounded-full bg-emerald-50 dark:bg-emerald-900/20 text-emerald-500 flex items-center justify-center">
                            <i class="ph ph-robot text-lg"></i>
                        </div>
                        <span class="font-medium text-sm">Botga qaytish</span>
                    </div>
                    <i class="ph ph-caret-right opacity-40"></i>
                </button>
            </div>

            <h3 class="text-sm font-semibold opacity-50 uppercase tracking-widest mb-3 ml-2 mt-2">Shaxsiy Eslatmalar</h3>
            <div class="glass-card flex flex-col mb-8 overflow-hidden relative">
                <!-- Loading overlay -->
                <div id="reminders-loading" class="absolute inset-0 bg-white/50 dark:bg-gray-900/50 backdrop-blur-sm z-10 flex items-center justify-center">
                    <i class="ph ph-spinner-gap animate-spin text-2xl text-[var(--accent)]"></i>
                </div>
                
                <div id="reminders-list" class="flex flex-col">
                    <!-- Javascript injects reminders here -->
                </div>
                
                <div class="relative w-full border-t border-[var(--border)] overflow-hidden">
                    <input type="time" id="reminder-time-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" required>
                    <button id="add-reminder-btn" class="p-4 flex items-center justify-center gap-2 text-[var(--accent)] active:bg-emerald-50 dark:active:bg-emerald-900/20 transition-colors w-full">
                        <i class="ph ph-plus-circle text-lg"></i>
                        <span class="font-medium text-sm">Yangi vaqt qo'shish</span>
                    </button>
                </div>
            </div>
            
            <h3 class="text-sm font-semibold text-red-500 opacity-80 uppercase tracking-widest mb-3 ml-2">Xavfli Hudud
            </h3>
            <div class="glass-card flex flex-col mb-10 overflow-hidden border border-red-200 dark:border-red-900/30">
                <button id="hard-reset-btn"
                    class="p-4 flex items-center justify-between active:bg-red-50 dark:active:bg-red-900/20 transition-colors w-full text-left">
                    <div class="flex items-center gap-3 text-red-500">
                        <div class="w-8 h-8 rounded-full bg-red-50 dark:bg-red-900/20 flex items-center justify-center">
                            <i class="ph ph-trash text-lg"></i>
                        </div>
                        <span class="font-medium text-sm">Ma'lumotlarni o'chirish</span>
                    </div>
                </button>
            </div>
        </div>

    </main>

    <!-- BOTTOM NAVIGATION (Floating Pill) -->
    <div class="glass-nav-container pb-safe">
        <nav class="glass-nav">
            <button class="nav-item active" data-target="view-tasbeh">
                <i class="ph ph-hand-heart text-2xl"></i>
                <span class="text-[10px] font-semibold uppercase tracking-wider">Tasbeh</span>
            </button>
            <button class="nav-item" data-target="view-zikrlar">
                <i class="ph ph-book-open text-2xl"></i>
                <span class="text-[10px] font-semibold uppercase tracking-wider">Zikrlar</span>
            </button>
            <button class="nav-item" data-target="view-stats">
                <i class="ph ph-chart-line-up text-2xl"></i>
                <span class="text-[10px] font-semibold uppercase tracking-wider">Statistika</span>
            </button>
            <button class="nav-item" data-target="view-profile">
                <i class="ph ph-user-circle text-2xl"></i>
                <span class="text-[10px] font-semibold uppercase tracking-wider">Profil</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>

</html>
