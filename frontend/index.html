<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qalb Taskini - Tasbeh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Apple uslubidagi shrift */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* SVG halqa uchun aylanish animatsiyasi va o'tishlar */
        .ring-circle {
            transition: stroke-dashoffset 0.3s ease-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Silliq bosilish effekti */
        .tap-area {
            transition: transform 0.1s ease-out;
        }
        .tap-area:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-between overflow-hidden py-10">
    
    <!-- Yuqori qism: Zikr nomi -->
    <div class="w-full px-6 flex flex-col items-center">
        <h1 id="dhikr-title" class="text-2xl font-semibold tracking-tight text-center">Astag'firulloh</h1>
        <p class="text-sm font-medium opacity-50 mt-1">Maqsad: <span id="target-count">100</span></p>
    </div>

    <!-- Markaziy qism: Apple Fitness Ring -->
    <div class="flex-1 flex flex-col items-center justify-center w-full relative tap-area" id="tap-area">
        <!-- SVG Halqa -->
        <svg class="w-72 h-72 drop-shadow-sm" viewBox="0 0 100 100">
            <!-- Orqa fon halqasi (och kulrang) -->
            <circle 
                cx="50" cy="50" r="44" 
                fill="none" 
                stroke="var(--tg-theme-hint-color, #E5E5EA)" 
                stroke-width="8" 
                opacity="0.3"
            />
            <!-- Asosiy progress halqasi (Apple yashil uslubi) -->
            <circle 
                id="progress-ring"
                class="ring-circle"
                cx="50" cy="50" r="44" 
                fill="none" 
                stroke="#34C759" 
                stroke-width="8" 
                stroke-linecap="round"
                stroke-dasharray="276.46" 
                stroke-dashoffset="276.46" 
            />
        </svg>

        <!-- Markazdagi raqam -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <span id="counter" class="text-7xl font-light tracking-tighter" style="font-variant-numeric: tabular-nums;">0</span>
        </div>
    </div>

    <!-- Pastki qism: Tugmalar -->
    <div class="w-full px-8 flex justify-between items-center pb-4">
        <!-- Nollash tugmasi (iOS piktogramma uslubida) -->
        <button id="reset-btn" class="w-12 h-12 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 active:opacity-70 transition-opacity">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        
        <!-- Saqlash tugmasi -->
        <button id="save-btn" class="px-6 py-3 rounded-full bg-[#007AFF] text-white font-semibold text-sm active:bg-blue-600 transition-colors shadow-sm">
            Saqlash
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
